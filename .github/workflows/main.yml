name: main

on:
  workflow_dispatch:
    inputs:
       Version:
         description: 'Version to build (e.g., 1.0.0)'
         required: true

env:
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # 🐳 登录 GHCR
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 🐳 登录 Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🏷️ 生成 tags
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/M3u8Downloader_H
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/m3u8downloader_h
          tags: |
            type=raw,value=${{ inputs.Version }}
            type=raw,value=latest

      - name: Download Release
        run: |
          mkdir -p app
          curl -L -o app.zip https://github.com/Harlan-H/M3u8Downloader_H/releases/download/${{  inputs.Version }}/M3u8Downloader_H-linux-x64.zip

      - name: Unzip
        run: |
          unzip app.zip -d app
          rm app.zip
          chmod +x app/M3u8Downloader_H

      # 🚀 构建并推送
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
